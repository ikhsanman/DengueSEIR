[.streamlit]
# Mengatur tema gelap kustom
[theme]
base = "dark"
primaryColor = "#58a6ff"          # Warna tombol, slider, aktif tab
backgroundColor = "#0d1117"       # Warna latar belakang utama
secondaryBackgroundColor = "#161b22" # Warna sidebar dan card container
textColor = "#c9d1d9"             # Warna teks utama
font = "sans serif"               # Pilihan: "sans serif", "serif", atau "monospace"
